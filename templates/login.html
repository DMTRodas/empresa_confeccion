{% extends "base.html" %}

{% block title %}Iniciar Sesión - Confecciones Gradiante{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu portal de Confecciones Gradiante</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="input-group">
                <label for="usuario">📧 Usuario o Email</label>
                <input type="text" id="usuario" name="usuario" required 
                       placeholder="usuario o email@empresa.com">
            </div>

            <div class="input-group">
                <label for="contrasena">🔒 Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required 
                       placeholder="Tu contraseña">
            </div>

            <button type="submit" class="auth-btn">
                 Ingresar
            </button>
        </form>

        {% if error %}
        <div class="error-msg">
            ⚠️ {{ error }}
        </div>
        {% endif %}

<style>
.auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #d8d8d8ff 0%);
    padding: 8rem;
}

.auth-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    padding: 3rem;
    width: 100%;
    max-width: 450px;
    border-top: 5px solid #040258ff;
}

.auth-header {
    text-align: center;
    margin-bottom: 2.5rem;
}

.auth-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.auth-header h1 {
    color: #2c3e50;
    margin-bottom: 0.5rem;
    font-size: 2.2rem;
    font-weight: 300;
}

.auth-header p {
    color: #7f8c8d;
    font-size: 1.1rem;
}

.auth-form {
    margin-bottom: 2rem;
}

.input-group {
    margin-bottom: 1.5rem;
}

.input-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #2c3e50;
    font-weight: 600;
    font-size: 0.95rem;
}

.input-group input {
    width: 100%;
    padding: 15px 20px;
    border: 2px solid #e9ecef;
    border-radius: 10px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f8f9fa;
}

.input-group input:focus {
    outline: none;
    border-color: #3498db;
    background: white;
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
}

.auth-btn {
    width: 100%;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    border: none;
    padding: 18px;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 1rem;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
}

.error-msg {
    background: #fee;
    color: #c33;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 1.5rem;
    text-align: center;
    border-left: 4px solid #c33;
}

.demo-credentials {
    background: #f8f9fa;
    padding: 1.5rem;
    border-radius: 15px;
    border-left: 4px solid #3498db;
}

.demo-credentials h3 {
    margin-top: 0;
    margin-bottom: 1.5rem;
    color: #2c3e50;
    text-align: center;
}

.user-type {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #e9ecef;
}

.user-type:last-child {
    border-bottom: none;
    margin-bottom: 0;
}

.user-type h4 {
    margin: 0 0 0.5rem 0;
    color: #2c3e50;
    font-size: 1rem;
}

.user-type p {
    margin: 0.25rem 0;
    color: #5a6c7d;
    font-size: 0.9rem;
}
</style>
{% endblock %}
